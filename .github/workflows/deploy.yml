name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # change if your default branch is called something else, e.g. "master"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        # next.config.js has output: "export", so `next build` writes the
        # fully static site straight into the ./out directory

      - name: Add .nojekyll
        run: touch ./out/.nojekyll
        # stops GitHub Pages' Jekyll processor from ignoring files/folders
        # that start with an underscore (e.g. Next's /_next assets)

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
